name: "Bug report"
description: "Something isn't working"
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes: { label: "What happened?", placeholder: "Describe the bug and steps to reproduce" }
    validations: { required: true }
  - type: input
    id: env
    attributes: { label: "Environment", placeholder: "OS, device, tool (CLI/GUI/root), version" }
